# Markdownlint configuration

# Default state for all rules
default: true

# Line length - MD013
MD013:
  line_length: 120
  code_blocks: false
  tables: false
  headings: false

# Multiple headings with same content - MD024
MD024:
  allow_different_nesting: true

# Inline HTML - MD033
MD033: false

# Bare URLs - MD034
MD034: false

# Emphasis used instead of heading - MD036
MD036: false

# First line heading - MD041
MD041: false

# No blank line around headings - MD022
MD022: false

# Heading content - MD043
MD043: false

# Code block language - MD040
MD040: false

# Ordered list item prefix - MD029
MD029:
  style: "one"
