- key: springboot
  name: Spring Boot 开发规范
  dir: 20_SpringBoot
  prefix: 20
  description: 定义分层架构、配置管理、安全控制、事务管理
  domain_principles:
  - name: 分层架构
    description: 严格遵循 Controller → Service → Repository 分层结构，每一层只依赖其直接下层。Controller 层只做参数校验和路由转发，不包含业务逻辑。
    example_good: "@RestController\n@RequestMapping(\"/api/v1/users\")\npublic class UserController {\n    private final UserService\
      \ userService;\n    \n    @GetMapping(\"/{id}\")\n    public ResponseEntity<UserResponse> getUser(@PathVariable Long\
      \ id) {\n        return ResponseEntity.ok(userService.findById(id));\n    }\n}"
    example_bad: "@RestController\npublic class UserController {\n    @Autowired\n    private JdbcTemplate jdbc;\n    \n \
      \   @GetMapping(\"/api/v1/users/{id}\")\n    public Map<String, Object> getUser(@PathVariable Long id) {\n        //\
      \ ❌ Controller 直接操作数据库\n        return jdbc.queryForMap(\"SELECT * FROM users WHERE id = ?\", id);\n    }\n}"
  - name: 约定优于配置
    description: 利用 Spring Boot 的自动配置和起步依赖，减少显式配置。例外通过 application.yml 覆盖。
  - name: 防御性编程
    description: 所有外部输入必须验证，所有 IO 操作必须处理异常，所有依赖必须可测试。
  domain_naming_rules:
  - category: Controller 类
    pattern: '{Entity}Controller'
    example: UserController
  - category: Service 接口
    pattern: '{Entity}Service'
    example: UserService
  - category: ServiceImpl 实现
    pattern: '{Entity}ServiceImpl'
    example: UserServiceImpl
  - category: Repository 接口
    pattern: '{Entity}Repository'
    example: UserRepository
  - category: Entity 类
    pattern: '{Entity}Entity 或 {Entity}'
    example: UserEntity
  - category: DTO 类
    pattern: '{Entity}{Action}Request/Response'
    example: UserCreateRequest
  - category: 配置文件
    pattern: application-{profile}.yml
    example: application-dev.yml
  - category: 测试类
    pattern: '{Entity}ServiceTest'
    example: UserServiceTest
  documents:
  - title: Layered Architecture 分层规范
    category: ''
    description: Spring Boot 项目分层架构标准，Controller/Service/Repository/DTO 分层职责
  - title: REST API 设计规范
    category: ''
    description: RESTful API 设计标准，URL 命名、HTTP 方法、状态码、响应格式
  - title: 异常处理规范
    category: Spring Boot
    description: 全局异常处理和错误响应标准
  - title: JPA 数据访问规范
    category: ''
