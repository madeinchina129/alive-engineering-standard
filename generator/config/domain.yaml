  - title: Flutter 项目结构
    category: Flutter
    description: Flutter 项目的目录结构和文件组织规范
    sections:
    - title: 层级架构
      content: 'Flutter 项目采用分层架构，从上到下依次为：


        - **Presentation Layer**（UI 层）：Widgets、Pages、Screens

        - **Application Layer**（应用层）：状态管理 + UseCases

        - **Domain Layer**（领域层）：Entities、Repositories 接口

        - **Data Layer**（数据层）：Repository 实现、DTO、数据源


        每一层只依赖其直接下层，严禁跨层引用。'
    - title: 目录规范
      content: "推荐的项目目录结构如下：\n\n```\nlib/\n├── main.dart                    # 入口\n├── app.dart                     # MaterialApp\
        \ 配置\n├── core/                        # 核心基础设施\n│   ├── api/                     # Dio 实例、拦截器\n│   │   ├── dio_client.dart\n\
        │   │   └── interceptors/\n│   ├── router/                  # GoRouter 配置\n│   │   └── app_router.dart\n│   ├── theme/\
        \                   # 主题\n│   │   ├── app_theme.dart\n│   │   ├── colors.dart\n│   │   └── typography.dart\n│   ├──\
        \ storage/                 # 本地存储\n│   │   └── local_storage.dart\n│   └── constants/               # 全局常量\n│    \
        \   ├── api_constants.dart\n│       └── app_constants.dart\n├── common/                      # 公共组件\n│   ├── widgets/\
        \                 # 通用 Widget\n│   │   ├── app_button.dart\n│   │   ├── app_text_field.dart\n│   │   ├── loading_overlay.dart\n\
        │   │   └── error_view.dart\n│   └── extensions/              # 扩展方法\n│       ├── context_extensions.dart\n│     \
        \  └── string_extensions.dart\n└── features/                    # 功能模块\n    ├── auth/\n    │   ├── models/\n    │\
        \   ├── services/\n    │   ├── screens/\n    │   └── widgets/\n    └── home/\n        ├── models/\n        ├── services/\n\
        \        ├── screens/\n        └── widgets/\n```\n\n> **规则**：feature 目录各自独立，不允许跨 feature 引用 widget。公共组件移入 `common/widgets/`。"
    - title: 文件命名规范
      content: '| 类型 | 命名规则 | 示例 |

        |------|---------|------|

        | Widget 文件 | `snake_case` + 类型后缀 | `login_screen.dart` |

        | Model 文件 | `snake_case` | `user_model.dart` |

        | Service 文件 | `xxx_service.dart` | `auth_service.dart` |

        | 测试文件 | 源文件 + `_test` | `login_screen_test.dart` |


        每个 Dart 文件不超过 400 行。超过则拆分为多个文件。'
    - title: 导入规范
      content: '所有导入使用相对路径或 `package:` 前缀：


        ```dart

        // ✅ Good: 使用 package: 前缀

        import ''package:alive/core/theme/colors.dart'';

        import ''package:alive/features/auth/models/user_model.dart'';


        // ✅ Good: 同级相对导入

        import ''../widgets/loading_overlay.dart'';


        // ❌ Bad: 不使用过长相对路径

        // import ''../../../../core/theme/colors.dart'';

        ```


        导入顺序：dart: → package: → 项目内的 package: → 相对导入，每组空行分隔。'
  - title: Hive 本地存储规范
