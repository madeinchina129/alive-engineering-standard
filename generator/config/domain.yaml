# Alive Engineering Standard — 域配置
# 定义所有 24 个文档模块及其文档定义

version: "1.0"
base_dir: "../docs"

domains:
  - key: "project"
    name: "项目基础规范"
    dir: "00_Project"
    prefix: 0
    description: "定义项目的核心原则、命名约定、目录结构、架构规范、工作流、质量标准"
    source_files:
      - "001_Project_Overview.md"
      - "002_Project_Principles.md"
      - "003_Project_Naming.md"
      - "004_Project_Directory.md"
      - "005_Project_Architecture.md"
      - "006_Project_Workflow.md"
      - "007_Project_Quality.md"
      - "008_Project_Communication.md"
      - "009_Project_Release.md"
      - "010_Project_Glossary.md"

  - key: "product"
    name: "产品设计规范"
    dir: "01_Product"
    prefix: 1
    description: "定义产品需求文档（PRD）的标准格式、用户故事规范、验收标准"
    documents:
      - title: "PRD 标准模板"
        category: "产品"
        description: "产品需求文档的标准模板结构，确保需求描述清晰一致"
      - title: "用户故事规范"
        category: "产品"
        description: "用户故事的编写标准和格式要求"
      - title: "验收标准定义"
        category: "产品"
        description: "验收标准的定义规范和评审流程"
      - title: "产品设计流程"
        category: "产品"
        description: "产品设计从需求到落地的完整流程规范"
      - title: "需求优先级排序"
        category: "产品"
        description: "需求优先级评估和排序的标准方法"

  - key: "domain"
    name: "领域设计规范"
    dir: "02_Domain"
    prefix: 2
    description: "定义领域驱动设计（DDD）的标准化使用方式"
    documents:
      - title: "限界上下文设计"
        category: "DDD"
        description: "限界上下文的划分原则和设计规范"
      - title: "通用语言定义"
        category: "DDD"
        description: "通用语言的建立和维护规范"
      - title: "聚合设计规范"
        category: "DDD"
        description: "聚合根和聚合的设计标准"
      - title: "领域事件规范"
        category: "DDD"
        description: "领域事件的定义和发布订阅规范"
      - title: "值对象与实体"
        category: "DDD"
        description: "值对象和实体的区分标准与设计规范"

  - key: "capability"
    name: "能力映射规范"
    dir: "03_Capability"
    prefix: 3
    description: "定义业务能力与技术实现的映射关系"
    documents:
      - title: "能力地图总览"
        category: "能力"
        description: "企业级能力地图的定义和视图规范"
      - title: "业务能力映射"
        category: "能力"
        description: "业务能力到技术实现的映射规范"
      - title: "能力成熟度评估"
        category: "能力"
        description: "能力成熟度评估模型和标准"
      - title: "能力演进路线图"
        category: "能力"
        description: "能力演进路线图的规划和跟踪规范"

  - key: "business"
    name: "业务逻辑规范"
    dir: "04_Business"
    prefix: 4
    description: "定义业务规则模式、校验模式、工作流定义的标准化方式"
    documents:
      - title: "业务规则模式"
        category: "业务"
        description: "业务规则的分类、定义和实现模式"
      - title: "数据校验规范"
        category: "业务"
        description: "输入校验、业务规则校验的标准模式"
      - title: "业务工作流定义"
        category: "业务"
        description: "业务流程的定义标准和实现方式"
      - title: "业务异常处理"
        category: "业务"
        description: "业务异常的标准化处理模式"

  - key: "workflow"
    name: "工作流规范"
    dir: "05_Workflow"
    prefix: 5
    description: "定义审批流程、状态机、Saga模式、BPMN标准"
    documents:
      - title: "状态机模式"
        category: "工作流"
        description: "状态机的标准化实现模式"
      - title: "审批工作流"
        category: "工作流"
        description: "审批流程的设计规范"
      - title: "Saga 分布式事务"
        category: "工作流"
        description: "分布式事务的 Saga 模式实现规范"
      - title: "BPMN 标准实践"
        category: "工作流"
        description: "BPMN 建模标准和最佳实践"

  - key: "event"
    name: "事件驱动规范"
    dir: "06_Event"
    prefix: 6
    description: "定义事件架构标准、事件契约、消息格式和CQRS模式"
    documents:
      - title: "事件驱动架构总览"
        category: "事件"
        description: "事件驱动架构的核心概念和选型指南"
      - title: "事件契约标准"
        category: "事件"
        description: "事件消息的契约定义规范"
      - title: "事件溯源模式"
        category: "事件"
        description: "事件溯源（Event Sourcing）的实现规范"
      - title: "CQRS 模式"
        category: "事件"
        description: "CQRS 模式的实现标准和最佳实践"
      - title: "消息队列选型"
        category: "事件"
        description: "消息中间件选型标准和对比"

  - key: "ui"
    name: "UI/UX 规范"
    dir: "07_UI"
    prefix: 7
    description: "定义组件库标准、设计令牌、响应式断点、无障碍访问"
    documents:
      - title: "组件库标准"
        category: "UI"
        description: "UI 组件的设计标准和命名规范"
      - title: "设计令牌系统"
        category: "UI"
        description: "Design Tokens 的定义和使用规范"
      - title: "响应式设计规范"
        category: "UI"
        description: "响应式布局的断点和适配规范"
      - title: "无障碍访问规范"
        category: "UI"
        description: "A11Y 无障碍访问标准和实践指南"
      - title: "主题与配色方案"
        category: "UI"
        description: "主题系统和配色方案的管理规范"

  - key: "api"
    name: "API 设计规范"
    dir: "08_API"
    prefix: 8
    description: "定义接口标准约定、版本管理、错误码规范"
    documents:
      - title: "RESTful API 规范"
        category: "API"
        description: "RESTful API 设计的标准和最佳实践"
      - title: "API 版本管理"
        category: "API"
        description: "API 版本管理的策略和规范"
      - title: "错误码规范"
        category: "API"
        description: "错误码和错误响应的标准格式"
      - title: "分页与过滤"
        category: "API"
        description: "列表接口的分页、排序、过滤标准"
      - title: "OpenAPI 规范"
        category: "API"
        description: "OpenAPI / Swagger 文档编写标准"

  - key: "database"
    name: "数据库规范"
    dir: "09_Database"
    prefix: 9
    description: "定义数据库命名规范、迁移策略、索引设计"
    documents:
      - title: "数据库对象命名规范"
        category: "数据库"
        description: "表、字段、索引等对象的命名标准"
      - title: "数据迁移模式"
        category: "数据库"
        description: "数据库迁移的规范和最佳实践"
      - title: "索引设计策略"
        category: "数据库"
        description: "索引设计的标准和性能考量"
      - title: "SQL 审查规范"
        category: "数据库"
        description: "SQL 审查的流程和检查清单"
      - title: "数据库安全管理"
        category: "数据库"
        description: "数据库安全配置和访问控制规范"

  - key: "flutter"
    name: "Flutter 开发规范"
    dir: "10_Flutter"
    prefix: 10
    description: "定义 Flutter 项目的状态管理、Widget 模式、依赖注入、测试策略"
    documents:
      - title: "Flutter 项目结构"
        category: "Flutter"
        description: "Flutter 项目的目录结构和文件组织规范"
      - title: "状态管理选型"
        category: "Flutter"
        description: "状态管理方案选型标准和最佳实践"
      - title: "Widget 设计规范"
