- key: vue3
  name: Vue3 开发规范
  dir: 30_Vue3
  prefix: 30
  description: 定义 Composition API、组件设计、Pinia 状态管理
  domain_principles:
  - name: Composition API 优先
    description: 所有逻辑组件优先使用 Composition API（setup + ref/reactive），避免 Options API 的 mixin 模式。
    example_good: "<script setup lang=\"ts\">\nimport { ref, onMounted } from 'vue'\n\nconst count = ref(0)\nconst doubleCount\
      \ = computed(() => count.value * 2)\n\nfunction increment() {\n  count.value++\n}\n</script>"
    example_bad: "<script>\nexport default {\n  data() {\n    return { count: 0 }\n  },\n  computed: {\n    doubleCount()\
      \ {\n      return this.count * 2\n    }\n  },\n  methods: {\n    increment() {\n      this.count++\n    }\n  }\n}\n\
      </script>"
  - name: TypeScript 严格模式
    description: Vue3 项目必须启用 TypeScript strict 模式。所有 props 必须有类型定义，所有函数必须有返回类型。
  - name: 单一职责组件
    description: 每个 .vue 文件只负责一个 UI 功能。超过 300 行拆分为子组件。公共逻辑提取为 composables。
  domain_naming_rules:
  - category: 页面组件
    pattern: '{Feature}Page.vue'
    example: UserListPage.vue
  - category: 通用组件
