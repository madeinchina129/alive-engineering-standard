    documents:
      - title: "Flutter 项目结构"
        category: "Flutter"
        description: "Flutter 项目的目录结构和文件组织规范"
        sections:
          - title: "层级架构"
            content: |-
              Flutter 项目采用分层架构，从上到下依次为：

              - **Presentation Layer**（UI 层）：Widgets、Pages、Screens
              - **Application Layer**（应用层）：状态管理 + UseCases
              - **Domain Layer**（领域层）：Entities、Repositories 接口
              - **Data Layer**（数据层）：Repository 实现、DTO、数据源

              每一层只依赖其直接下层，严禁跨层引用。

          - title: "目录规范"
            content: |-
              推荐的项目目录结构如下：

              ```
              lib/
              ├── main.dart                    # 入口
              ├── app.dart                     # MaterialApp 配置
              ├── core/                        # 核心基础设施
              │   ├── api/                     # Dio 实例、拦截器
              │   │   ├── dio_client.dart
              │   │   └── interceptors/
              │   ├── router/                  # GoRouter 配置
              │   │   └── app_router.dart
              │   ├── theme/                   # 主题
              │   │   ├── app_theme.dart
              │   │   ├── colors.dart
              │   │   └── typography.dart
              │   ├── storage/                 # 本地存储
              │   │   └── local_storage.dart
              │   └── constants/               # 全局常量
              │       ├── api_constants.dart
              │       └── app_constants.dart
              ├── common/                      # 公共组件
              │   ├── widgets/                 # 通用 Widget
              │   │   ├── app_button.dart
              │   │   ├── app_text_field.dart
              │   │   ├── loading_overlay.dart
              │   │   └── error_view.dart
              │   └── extensions/              # 扩展方法
              │       ├── context_extensions.dart
              │       └── string_extensions.dart
              └── features/                    # 功能模块
                  ├── auth/
                  │   ├── models/
                  │   ├── services/
                  │   ├── screens/
                  │   └── widgets/
                  └── home/
                      ├── models/
                      ├── services/
                      ├── screens/
                      └── widgets/
              ```

              > **规则**：feature 目录各自独立，不允许跨 feature 引用 widget。公共组件移入 `common/widgets/`。

          - title: "文件命名规范"
            content: |-
              | 类型 | 命名规则 | 示例 |
              |------|---------|------|
              | Widget 文件 | `snake_case` + 类型后缀 | `login_screen.dart` |
              | Model 文件 | `snake_case` | `user_model.dart` |
              | Service 文件 | `xxx_service.dart` | `auth_service.dart` |
              | 测试文件 | 源文件 + `_test` | `login_screen_test.dart` |

              每个 Dart 文件不超过 400 行。超过则拆分为多个文件。

          - title: "导入规范"
            content: |-
              所有导入使用相对路径或 `package:` 前缀：

              ```dart
              // ✅ Good: 使用 package: 前缀
              import 'package:alive/core/theme/colors.dart';
              import 'package:alive/features/auth/models/user_model.dart';

              // ✅ Good: 同级相对导入
              import '../widgets/loading_overlay.dart';

              // ❌ Bad: 不使用过长相对路径
              // import '../../../../core/theme/colors.dart';
              ```

              导入顺序：dart: → package: → 项目内的 package: → 相对导入，每组空行分隔。

      - title: "状态管理选型"
        category: "Flutter"
        description: "状态管理方案选型标准和最佳实践"
        sections:
          - title: "选型原则"
            content: |-
              团队统一使用 **Riverpod** 作为主要状态管理方案。

              **选型决策矩阵**：

              | 场景 | 推荐方案 | 优先级 |
              |------|---------|--------|
              | 全局状态（用户信息、主题） | Riverpod Provider | P0 |
              | 页面级状态（表单、列表） | StateNotifierProvider | P0 |
              | 异步数据（API 请求） | AsyncValue / FutureProvider | P0 |
              | 本地 UI 状态 | StatefulWidget + setState | P1 |

          - title: "Riverpod 使用规范"
            content: |-
              ```dart
              // ✅ Provider 定义
              final userProvider = Provider<UserRepository>((ref) {
                return UserRepository(ref.watch(dioProvider));
              });

              // ✅ StateNotifierProvider
              final authProvider = StateNotifierProvider<AuthNotifier, AuthState>((ref) {
                return AuthNotifier(ref.watch(userProvider));
              });

              // ✅ 在 Widget 中使用
              class LoginScreen extends ConsumerWidget {
                @override
                Widget build(BuildContext context, WidgetRef ref) {
                  final authState = ref.watch(authProvider);
                  return authState.when(
                    data: (user) => HomeScreen(),
                    loading: () => LoadingOverlay(),
                    error: (e, _) => ErrorView(e.toString()),
                  );
                }
              }
              ```

              **禁止**：直接使用 `ChangeNotifierProvider` 或全局单例模式管理状态。

          - title: "状态分层"
            content: |-
              状态按作用域分为三层：

              1. **全局状态**（App-wide）：登录状态、主题、语言——顶层 Provider
              2. **模块状态**（Feature-wide）：当前用户的订单列表、消息——模块级 Provider
              3. **局部状态**（Widget-only）：表单输入、展开/折叠——setState

              全局 Provider 定义在 `lib/core/providers/`，模块级定义在对应 `features/*/providers/`。

      - title: "Widget 设计规范"
        category: "Flutter"
        description: "Widget 组件的设计模式和命名规范"
        sections:
          - title: "组件粒度原则"
            content: |-
              一个 Widget 只做一件事。拆分组件的阈值：

              - 超过 100 行 → 拆分子 Widget
              - 超过 3 层嵌套 → 提取为方法或独立 Widget
              - 同一逻辑出现 2 次以上 → 抽取为公共组件

          - title: "Widget 命名规范"
            content: |-
              | 类型 | 后缀 | 示例 |
              |------|------|------|
              | 页面 | Screen | `LoginScreen` |
              | 可复用组件 | Widget | `LoadingButton` |
              | 容器/布局 | Box / Card | `ProfileCard` |
              | 表单字段 | Field | `PhoneNumberField` |
              | 对话框 | Dialog | `ConfirmDialog` |

          - title: "StatelessWidget vs StatefulWidget"
            content: |-
              默认优先使用 **StatelessWidget**。需要状态时才使用 StatefulWidget：

              ```dart
              // ✅ Good: 纯展示组件 → StatelessWidget
              class UserAvatar extends StatelessWidget {
                const UserAvatar({super.key, required this.url});
                final String url;

                @override
                Widget build(BuildContext context) => CircleAvatar(backgroundImage: NetworkImage(url));
              }

              // ✅ 需要生命周期 → StatefulWidget
              class TimerWidget extends StatefulWidget { ... }

              // 但优先考虑用 Riverpod 替代 StatefulWidget 的状态管理
              ```

          - title: "Build 方法规范"
            content: |-
              1. Build 方法保持纯净——不发起网络请求，不做耗时计算
              2. Build 中使用 `?.` 和 `??` 处理空安全
              3. Widget tree 嵌套不超过 7 层（7 层以上考虑拆分）
              4. 使用 `const constructor` 优化重建性能

              ```dart
              // ✅ Good
              @override
              Widget build(BuildContext context) {
                return Scaffold(
                  appBar: AppBar(title: const Text('用户信息')),
                  body: Padding(
                    padding: const EdgeInsets.all(16),
                    child: Column(
                      children: [
                        UserAvatar(url: user.avatarUrl),
                        const SizedBox(height: 16),
                        UserInfoCard(user: user),
                      ],
                    ),
                  ),
                );
              }
              ```

      - title: "网络层规范"
        category: "Flutter"
        description: "网络请求层的架构和实现规范"
        sections:
          - title: "架构"
            content: |-
              网络层统一使用 **Dio**，封装在 `lib/core/api/` 中：

              ```
              lib/core/api/
              ├── dio_client.dart        # Dio 单例 + 基础配置
              ├── api_response.dart      # 统一响应模型
              ├── api_exception.dart     # 异常定义
              └── interceptors/
                  ├── auth_interceptor.dart    # 自动注入 Token
                  ├── logging_interceptor.dart  # 请求日志
                  └── error_interceptor.dart   # 错误统一处理
              ```

          - title: "Dio 实例配置"
            content: |-
              ```dart
              final dioProvider = Provider<Dio>((ref) {
                final dio = Dio(BaseOptions(
                  baseUrl: AppConstants.apiBaseUrl,
                  connectTimeout: const Duration(seconds: 10),
                  receiveTimeout: const Duration(seconds: 10),
                  headers: {'Content-Type': 'application/json'},
                ));
                dio.interceptors.addAll([
                  AuthInterceptor(),
                  LoggingInterceptor(),
                  ErrorInterceptor(),
                ]);
                return dio;
              });
              ```

              禁止在每个 Service 中重复创建 Dio 实例。

          - title: "Repository 模式"
            content: |-
              每个数据模型对应一个 Repository，封装所有 API 调用：

              ```dart
              // ✅ Repository 层
              class UserRepository {
                UserRepository(this._dio);
                final Dio _dio;

                Future<User> getUser(String id) async {
                  final response = await _dio.get('/api/v1/user/$id');
                  return User.fromJson(response.data);
                }

                Future<List<User>> getUsers({int page = 1}) async {
                  final response = await _dio.get('/api/v1/user', queryParameters: {'page': page});
                  return (response.data['data'] as List).map((e) => User.fromJson(e)).toList();
                }
              }
              ```

              Repository 返回领域 Model，不返回 Dio Response。异常由拦截器统一处理。

          - title: "错误处理规范"
            content: |-
              ```dart
              // ✅ 在 Service/Notifier 中处理错误
              Future<void> fetchUsers() async {
                state = const AsyncValue.loading();
                state = await AsyncValue.guard(() => _userRepository.getUsers());
                // AsyncValue.guard 自动捕获异常，不需要 try-catch
              }

              // 在 Widget 中使用
              users.when(
                data: (list) => UserListView(list),
                error: (e, _) => ErrorView(
                  message: e is ApiException ? e.userMessage : '网络异常，请稍后重试',
                  onRetry: () => ref.invalidate(usersProvider),
                ),
              );
              ```

      - title: "路由管理规范"
        category: "Flutter"
        description: "Flutter 路由管理的标准方案"
        sections:
          - title: "方案选型"
            content: |-
              统一使用 **GoRouter** 作为路由方案。

              **为什么选 GoRouter**：
              - 声明式路由配置
              - 支持深度链接
              - 内置 Redirect 守卫
              - 支持 ShellRoute（底部导航嵌套）

          - title: "路由配置规范"
            content: |-
              所有路由集中定义在 `lib/core/router/app_router.dart`：

              ```dart
              final appRouter = GoRouter(
                initialLocation: '/login',
                redirect: (context, state) {
                  final isLoggedIn = ref.read(authProvider).isLoggedIn;
                  final isLoginRoute = state.matchedLocation == '/login';

                  if (!isLoggedIn && !isLoginRoute) return '/login';
                  if (isLoggedIn && isLoginRoute) return '/home';
                  return null;
                },
                routes: [
                  GoRoute(path: '/login', builder: (_, __) => const LoginScreen()),
                  ShellRoute(
                    builder: (_, __, child) => MainShell(child: child),
                    routes: [
                      GoRoute(path: '/home', builder: (_, __) => const HomeScreen()),
                      GoRoute(path: '/profile', builder: (_, __) => const ProfileScreen()),
                    ],
                  ),
                  GoRoute(path: '/mood/:id', builder: (_, state) => MoodDetailScreen(id: state.pathParameters['id']!)),
                ],
              );
              ```

          - title: "传参规范"
            content: |-
              **路径参数**：用于必需的业务标识（id、slug）

              ```dart
              // 跳转
              context.go('/mood/$id');
              // 接收
              final id = state.pathParameters['id']!;
              ```

              **Extra 参数**：用于页面间的临时数据传递

              ```dart
              // 传递
              context.push('/mood/detail', extra: moodRecord);
              // 接收
              final record = state.extra as MoodRecord;
              ```

              禁止：将需要持久化的业务数据通过路由参数传递。应通过 Provider/Repository 获取。

          - title: "页面 Transition"
            content: |-
              列表→详情页使用 `SlideTransition`（iOS 风格），Tab 切换使用 `FadeTransition`。

              ```dart
              GoRoute(
                path: '/mood/detail',
                pageBuilder: (context, state) => CustomTransitionPage(
                  key: state.pageKey,
                  child: const MoodDetailScreen(),
                  transitionsBuilder: (_, animation, __, child) =>
                    SlideTransition(position: Tween(begin: const Offset(1, 0), end: Offset.zero).animate(animation), child: child),
                ),
              );
              ```

      - title: "Flutter 测试策略"
        category: "Flutter"
        description: "Flutter 单元测试、Widget 测试、集成测试规范"
        sections:
          - title: "测试金字塔"
            content: |-
              Flutter 项目遵循标准测试金字塔：

              ```
                       /\           E2E / 集成测试（10%）
                      /  \          耗时较长的端到端场景
                     /    \
                    /------\
                   / Widget \        Widget 测试（30%）
                  /  测试     \      组件级别，Mock 依赖
                 /------------\
                /  单元测试     \    单元测试（60%）
               /  （Model/Service） 纯逻辑，快速稳定
              /--------------------\
              ```

          - title: "单元测试规范"
            content: |-
              所有 Model、Service、Repository 必须有单元测试：

              ```dart
              void main() {
                late UserRepository repository;
                late MockDio mockDio;

                setUp(() {
                  mockDio = MockDio();
                  repository = UserRepository(mockDio);
                });

                group('getUser', () {
                  test('returns User on success', () async {
                    when(() => mockDio.get(any())).thenAnswer(
                      (_) async => Response(data: mockUserJson, requestOptions: RequestOptions()),
                    );
                    final user = await repository.getUser('1');
                    expect(user.id, '1');
                    expect(user.name, 'Test');
                  });

                  test('throws ApiException on 404', () async {
                    when(() => mockDio.get(any())).thenThrow(DioException(
                      response: Response(statusCode: 404, requestOptions: RequestOptions()),
                      requestOptions: RequestOptions(),
                    ));
                    expect(() => repository.getUser('999'), throwsA(isA<ApiException>()));
                  });
                });
              }
              ```

              覆盖率目标：Service/Repository 层 ≥ 90%，Model 层 100%。

          - title: "Widget 测试规范"
            content: |-
              页面级别 Widget 必须测试关键交互路径：

              ```dart
              void main() {
                testWidgets('LoginScreen shows error on empty fields', (tester) async {
                  await tester.pumpWidget(const MaterialApp(home: LoginScreen()));

                  // 点击提交按钮（未填表单）
                  await tester.tap(find.text('登录'));
                  await tester.pumpAndSettle();

                  // 验证错误提示
                  expect(find.text('请输入手机号'), findsOneWidget);
                });

                testWidgets('LoginScreen navigates on success', (tester) async {
                  // Mock 登录成功
                  await tester.pumpWidget(ProviderScope(overrides: [...], child: const MaterialApp(home: LoginScreen())));

                  await tester.enterText(find.byType(TextField).at(0), '13800138000');
                  await tester.enterText(find.byType(TextField).at(1), 'password123');
                  await tester.tap(find.text('登录'));
                  await tester.pumpAndSettle();

                  expect(find.byType(HomeScreen), findsOneWidget);
                });
              }
              ```

          - title: "Mock 规范"
            content: |-
              统一使用 **Mockito** 配合 `@GenerateMocks` 生成 Mock 类：

              ```dart
              @GenerateMocks([UserRepository, Dio])
              void main() {
                // 在测试文件中使用 Mock 类
              }
              ```

              禁止：手动编写 Mock 类。禁止在测试中发起真实网络请求。

      - title: "Flutter 性能优化"
        category: "Flutter"
        description: "Flutter 性能优化指南和最佳实践"
        sections:
          - title: "性能指标目标"
            content: |-
              | 指标 | 目标值 | 测量工具 |
              |------|--------|---------|
              | 首帧渲染（FP） | < 500ms | DevTools |
              | 页面切换时间 | < 300ms | DevTools Timeline |
              | 帧率 | 60fps（稳定） | DevTools Performance |
              | 包体积 | < 30MB（Release） | `flutter build apk --analyze-size` |
              | 内存峰值 | < 200MB | DevTools Memory |

          - title: "构建优化"
            content: |-
              1. **const Widget**：所有不变的 Widget 使用 `const` 构造函数

              ```dart
              // ✅ Good
              const Padding(
                padding: EdgeInsets.all(16),
                child: Text('标题', style: TextStyle(fontSize: 18)),
              )
              ```

              2. **RepaintBoundary**：对动画、列表项等独立渲染区域添加边界

              ```dart
              RepaintBoundary(child: AnimatedWidget(...))
              ```

              3. **ListView.builder**：长列表必须使用 `ListView.builder`，禁止用 `Column` + `for`

              ```dart
              // ✅ Good
              ListView.builder(
                itemCount: items.length,
                itemBuilder: (_, i) => ItemCard(items[i]),
              )
              // ❌ Bad
              Column(children: items.map((e) => ItemCard(e)).toList())
              ```

          - title: "图片优化"
            content: |-
              1. 使用 `cached_network_image` 代替原生 `Image.network`
              2. 指定图片宽高，避免布局抖动
              3. 使用 WebP 格式代替 PNG/JPEG
              4. Asset 图片使用 `flutter gen-l10n` 或自动缩放

              ```dart
              // ✅ Good
              CachedNetworkImage(
                imageUrl: url,
                width: 100,
                height: 100,
                placeholder: (_, __) => const ShimmerBox(),
                errorWidget: (_, __, ___) => const Icon(Icons.error),
              )
              ```

          - title: "包体积优化"
            content: |-
              1. 使用 `--split-debug-info` 和 `--obfuscate` 构建 Release
              2. 移除未使用的依赖（定期 `flutter pub deps` 审计）
              3. 字体只包含使用的字重
              4. 使用 `shrinkResources = true`（Android）

              ```bash
              flutter build apk --release --split-debug-info=debug/ --obfuscate
              ```

  - key: "vue3"
    name: "Vue3 开发规范"
    dir: "11_Vue3"
    prefix: 11
    description: "定义 Composition API、组件设计、Pinia 状态管理"
    domain_principles:
      - name: "Composition API 优先"
        description: "所有逻辑组件优先使用 Composition API（setup + ref/reactive），避免 Options API 的 mixin 模式。"
        example_good: "<script setup lang=\"ts\">\nimport { ref, onMounted } from 'vue'\n\nconst count = ref(0)\nconst doubleCount = computed(() => count.value * 2)\n\nfunction increment() {\n  count.value++\n}\n</script>"
        example_bad: "<script>\nexport default {\n  data() {\n    return { count: 0 }\n  },\n  computed: {\n    doubleCount() {\n      return this.count * 2\n    }\n  },\n  methods: {\n    increment() {\n      this.count++\n    }\n  }\n}\n</script>"
      - name: "TypeScript 严格模式"
        description: "Vue3 项目必须启用 TypeScript strict 模式。所有 props 必须有类型定义，所有函数必须有返回类型。"
      - name: "单一职责组件"
        description: "每个 .vue 文件只负责一个 UI 功能。超过 300 行拆分为子组件。公共逻辑提取为 composables。"
    domain_naming_rules:
      - category: "页面组件"
        pattern: "{Feature}Page.vue"
        example: "UserListPage.vue"
      - category: "通用组件"
        pattern: "{ComponentName}.vue"
        example: "DataTable.vue"
      - category: "Composable"
        pattern: "use{Feature}.ts"
        example: "useUserList.ts"
      - category: "Pinia Store"
        pattern: "use{Feature}Store.ts"
        example: "useUserStore.ts"
      - category: "API 文件"
        pattern: "{feature}.ts"
        example: "user.ts"
      - category: "类型定义"
        pattern: "{feature}.d.ts 或 types/{feature}.ts"
        example: "types/user.ts"
      - category: "测试文件"
