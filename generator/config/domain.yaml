      - title: "配置管理规范"
        category: "Spring Boot"
        description: "外部化配置和 multi-environment 配置标准"
      - title: "安全控制规范"
        category: "Spring Boot"
        description: "Spring Security 集成和权限管理规范"
      - title: "事务管理规范"
        category: "Spring Boot"
        description: "声明式事务和编程式事务的使用标准"
      - title: "异常处理规范"
        category: "Spring Boot"
        description: "全局异常处理和错误响应标准"
      - title: "日志规范"
        category: "Spring Boot"
        description: "SLF4J/Logback 日志记录规范"
      - title: "Spring Boot 测试"
        category: "Spring Boot"
        description: "单元测试和集成测试规范"

  - key: "ai"
