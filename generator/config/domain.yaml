        description: "Widget 组件的设计模式和命名规范"
      - title: "网络层规范"
        category: "Flutter"
        description: "网络请求层的架构和实现规范"
      - title: "路由管理规范"
        category: "Flutter"
        description: "Flutter 路由管理的标准方案"
      - title: "Flutter 测试策略"
        category: "Flutter"
        description: "Flutter 单元测试、Widget 测试、集成测试规范"
      - title: "Flutter 性能优化"
        category: "Flutter"
        description: "Flutter 性能优化指南和最佳实践"

  - key: "vue3"
    name: "Vue3 开发规范"
    dir: "11_Vue3"
    prefix: 11
    description: "定义 Composition API、组件设计、Pinia 状态管理"
    documents:
      - title: "Vue3 项目结构"
        category: "Vue3"
        description: "Vue3 项目的目录结构和文件组织规范"
      - title: "Composition API 规范"
        category: "Vue3"
        description: "Composition API 的编写标准和最佳实践"
      - title: "组件设计规范"
        category: "Vue3"
        description: "Vue3 组件的设计模式和命名规范"
      - title: "Pinia Store 规范"
        category: "Vue3"
        description: "Pinia 状态管理库的使用标准"
      - title: "路由配置规范"
        category: "Vue3"
        description: "Vue Router 的配置和使用规范"
      - title: "Vue3 测试规范"
        category: "Vue3"
        description: "Vue3 组件的测试标准和实践"

  - key: "springboot"
    name: "Spring Boot 开发规范"
    dir: "12_SpringBoot"
    prefix: 12
    description: "定义分层架构、配置管理、安全控制、事务管理"
    documents:
      - title: "项目分层架构"
