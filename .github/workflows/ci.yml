name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -r generator/requirements.txt

      - name: Check formatting with Black
        run: black --check --line-length=100 generator/

      - name: Check imports with isort
        run: isort --check-only --profile=black --line-length=100 generator/

      - name: Lint with flake8
        run: flake8 generator/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Type check with mypy
        run: mypy generator/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Test Generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r generator/requirements.txt

      - name: Test generator list
        run: |
          python -m generator --list

      - name: Test generation
        run: |
          python -m generator --domain flutter --count 2
          python -m generator --domain api --count 1

      - name: Test JSON output
        run: |
          python -m generator --domain flutter --count 1 --format json

      - name: Test backward compatibility
        run: |
          python generator/generate_rule.py --list

      - name: Test dry-run mode
        run: |
          python -m generator --domain flutter --count 2 --dry-run

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
          pip install -r generator/requirements.txt

      - name: Build documentation
        run: mkdocs build --strict
        continue-on-error: true

  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
