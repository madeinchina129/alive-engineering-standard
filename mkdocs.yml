site_name: Alive Engineering Standard
site_description: Alive 工程标准规范文档
repo_url: https://github.com/madeinchina129/alive-engineering-standard
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate

nav:
  - 首页: index.md
  - 标准规范:
    - 概述: standards/overview.md
  - 模板: templates/
  - Prompt: prompts/
  - 上下文: contexts/
  - 检查清单: checklists/
  - 示例: examples/
  - ADR: adr/
  - 架构图: diagrams/
  - API 规范: openapi/
  - SQL: sql/
  - 脚本: scripts/
  - 工具: tools/

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

plugins:
  - search
