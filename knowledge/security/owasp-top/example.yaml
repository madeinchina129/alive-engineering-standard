```yaml
# OWASP Top 10 防护措施
protections:
  A01:
    name: 访问控制失效（Broken Access Control）
    prevention:
      - 默认拒绝访问策略
      - RBAC 权限模型
      - API 级别权限校验
      - 禁用目录列表
      
  A03:
    name: 注入（Injection）
    prevention:
      - 参数化查询（PreparedStatement）
      - 输入验证白名单
      - 输出 HTML 编码
      - ORM 框架使用
      
  A05:
    name: 安全配置错误（Security Misconfiguration）
    prevention:
      - 安全头部配置：
        Content-Security-Policy: default-src 'self'
        X-Frame-Options: DENY
        Strict-Transport-Security: max-age=31536000
        X-Content-Type-Options: nosniff
      - 最小化开放端口
      - 禁用默认账户
```