```yaml
# 数据加密方案
encryption:
  # 传输加密
  transit:
    protocol: TLS 1.3
    scope: 所有外网通信
    cert_manager: Let's Encrypt / cert-manager
    
  # 存储加密
  at_rest:
    - layer: 磁盘
      method: AES-256-XTS
      scope: 全部数据盘
      key_source: Cloud KMS
    - layer: 数据库
      method: AES-256-GCM
      scope: 用户表敏感字段（手机号、身份证、银行卡）
      key_rotation: 90 天
    
  # 应用层加密
  application:
    - method: AES-256-GCM
      scope: 个人敏感信息
      key_source: KMS + DEK 缓存
      key_rotation: 每次读取时
```