```yaml
# 负载测试方案
load_test:
  tool: k6
  target: 订单服务 (staging)
  
  scenarios:
    # 基准测试
    - type: baseline
      target_rate: 100 req/s
      duration: 5min
      
    # 负载测试
    - type: load
      target_rate: 500 req/s
      duration: 30min
      
    # 压力测试
    - type: stress
      start_rate: 100 req/s
      end_rate: 2000 req/s
      ramp_up: 10min
      
    # 耐久测试
    - type: endurance
      target_rate: 300 req/s
      duration: 4h
  
  thresholds:
    - metric: http_req_duration_p99
      threshold: '<= 2000ms'
    - metric: http_req_failed
      threshold: '<= 0.01'
```